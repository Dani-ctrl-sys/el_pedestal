<svg viewBox="0 0 450 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .node { fill: #2a2a2a; stroke: #888; stroke-width: 2px; }
    .zeta { fill: #4a90e2; }
    .text { font-family: sans-serif; font-size: 14px; fill: white; text-anchor: middle; font-weight: bold; }
    .op { font-size: 24px; fill: black; font-weight: bold; text-anchor: middle; }
    .line { stroke: #888; stroke-width: 2px; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
    </marker>
  </defs>
  
  <rect x="20" y="30" width="90" height="40" rx="5" class="node"/>
  <text x="65" y="55" class="text">a[j]</text>
  
  <rect x="20" y="130" width="90" height="40" rx="5" class="node"/>
  <text x="65" y="155" class="text">a[j+len]</text>
  
  <circle cx="175" cy="150" r="25" class="node zeta"/>
  <text x="175" y="155" class="text">× ζ</text>

  <circle cx="280" cy="50" r="18" fill="#eee" stroke="#333"/>
  <text x="280" y="58" class="op">+</text>

  <circle cx="280" cy="150" r="18" fill="#eee" stroke="#333"/>
  <text x="280" y="158" class="op">-</text>

  <rect x="330" y="30" width="100" height="40" rx="5" class="node"/>
  <text x="380" y="55" class="text">a[j] (new)</text>

  <rect x="330" y="130" width="100" height="40" rx="5" class="node"/>
  <text x="380" y="155" class="text">a[j+len] (new)</text>

  <path d="M 110 50 L 262 50" class="line"/>
  <path d="M 110 50 L 262 145" class="line"/>

  <path d="M 110 150 L 150 150" class="line"/>
  <path d="M 200 150 L 262 150" class="line"/>
  <path d="M 200 150 L 262 55" class="line"/>

  <path d="M 298 50 L 330 50" class="line"/>
  <path d="M 298 150 L 330 150" class="line"/>
</svg>